<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const repo = "/tolkiHandMade";
        
        sessionStorage.setItem("tolki_redirect", location.href);
        
        const target = location.protocol + "//" + location.hostname + (location.port ? ":" + location.port : "") + repo + "/";
        location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to application...</p>
  </body>
</html>
